<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VidFlow AI — Pixel Office</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #0a0a14; --bg2: #11111f; --bg3: #1a1a2e;
    --border: #2a2a4a; --text: #e0e0ff; --dim: #5a5a8a;
    --green: #00ff88; --red: #ff4466; --blue: #4488ff;
    --yellow: #ffcc00; --cyan: #00ccff; --magenta: #ff44ff;
    --orange: #ff8844; --pixel: 'Courier New', monospace;
  }
  body { background:var(--bg); color:var(--text); font-family:var(--pixel); overflow-x:hidden; }

  /* ── HEADER ─────────────────────────────────────────── */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 20px; background:var(--bg2);
    border-bottom:1px solid var(--border);
  }
  .logo { font-size:18px; font-weight:bold; color:var(--cyan); letter-spacing:2px; }
  .logo span { color:var(--magenta); }
  .status-pill {
    padding:4px 14px; border-radius:4px; font-size:12px; font-weight:bold;
    display:flex; align-items:center; gap:6px;
  }
  .status-pill.active { background:#003322; color:var(--green); border:1px solid var(--green); }
  .status-pill.stopped { background:#330011; color:var(--red); border:1px solid var(--red); }
  .pulse { width:8px; height:8px; border-radius:50%; background:currentColor; animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .time { color:var(--dim); font-size:12px; }

  /* ── LAYOUT ──────────────────────────────────────────── */
  .main { display:grid; grid-template-columns:1fr 280px; gap:0; height:calc(100vh - 49px); }
  .left { overflow-y:auto; padding:16px; }
  .right { border-left:1px solid var(--border); display:flex; flex-direction:column; }

  /* ── AGENT GRID ──────────────────────────────────────── */
  .agents-grid {
    display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:16px;
  }
  @media(max-width:1100px){ .agents-grid{ grid-template-columns:repeat(3,1fr); } }

  .agent-card {
    background:var(--bg2); border:1px solid var(--border);
    border-radius:6px; padding:10px; text-align:center;
    transition:border-color .3s, box-shadow .3s; position:relative; overflow:hidden;
  }
  .agent-card.working { border-color:var(--cyan); box-shadow:0 0 12px rgba(0,204,255,.15); }
  .agent-card.done    { border-color:var(--green); box-shadow:0 0 8px rgba(0,255,136,.1); }
  .agent-card.error   { border-color:var(--red); box-shadow:0 0 8px rgba(255,68,102,.15); }

  .agent-num {
    position:absolute; top:6px; left:8px;
    font-size:10px; color:var(--dim); font-weight:bold;
  }
  .agent-sprite {
    font-size:28px; margin:8px 0 4px; height:36px;
    display:flex; align-items:center; justify-content:center;
    animation:none;
  }
  .agent-card.working .agent-sprite { animation:bob 0.8s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }

  .agent-face {
    font-family:var(--pixel); font-size:14px; line-height:1.3;
    margin:0 auto 8px; white-space:pre; color:var(--text);
    transition:all .4s;
  }
  .agent-card.working .agent-face { color:var(--cyan); }
  .agent-card.done    .agent-face { color:var(--green); }
  .agent-card.error   .agent-face { color:var(--red); }

  .agent-name { font-size:11px; font-weight:bold; color:var(--text); margin-bottom:4px; }
  .agent-task {
    font-size:10px; color:var(--dim); min-height:14px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .agent-card.working .agent-task { color:var(--cyan); }

  .agent-status-dot {
    width:6px; height:6px; border-radius:50%; display:inline-block; margin-right:4px;
    background:var(--dim);
  }
  .agent-card.working .agent-status-dot { background:var(--cyan); animation:pulse .8s infinite; }
  .agent-card.done    .agent-status-dot { background:var(--green); }
  .agent-card.error   .agent-status-dot { background:var(--red); }

  .agent-last { font-size:9px; color:var(--dim); margin-top:4px; }

  /* ── SPEECH BUBBLE ───────────────────────────────────── */
  .bubble {
    position:absolute; top:4px; right:6px;
    background:var(--bg3); border:1px solid var(--cyan);
    border-radius:4px; padding:2px 6px; font-size:9px;
    color:var(--cyan); max-width:90px; overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap;
    opacity:0; transition:opacity .3s;
    pointer-events:none;
  }
  .agent-card.working .bubble { opacity:1; }

  /* ── BOTTOM PANELS ───────────────────────────────────── */
  .bottom-panels { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .panel {
    background:var(--bg2); border:1px solid var(--border);
    border-radius:6px; padding:12px;
  }
  .panel-title {
    font-size:11px; font-weight:bold; color:var(--dim);
    text-transform:uppercase; letter-spacing:1px; margin-bottom:10px;
    border-bottom:1px solid var(--border); padding-bottom:6px;
  }

  /* Pipeline queue */
  .queue-item { display:flex; align-items:center; gap:8px; margin-bottom:6px; font-size:11px; }
  .queue-bar-wrap { flex:1; height:6px; background:var(--bg3); border-radius:3px; overflow:hidden; }
  .queue-bar { height:100%; border-radius:3px; transition:width .5s; }
  .q-uploaded .queue-bar { background:var(--green); }
  .q-approved .queue-bar { background:var(--blue); }
  .q-check    .queue-bar { background:var(--cyan); }
  .q-gen      .queue-bar { background:var(--yellow); }
  .q-fix      .queue-bar { background:var(--red); }
  .queue-count { font-size:11px; font-weight:bold; min-width:20px; text-align:right; }

  /* ── RIGHT PANEL ─────────────────────────────────────── */
  .right-title {
    padding:12px 14px 8px; font-size:11px; font-weight:bold;
    color:var(--dim); text-transform:uppercase; letter-spacing:1px;
    border-bottom:1px solid var(--border);
  }

  /* Changelog */
  .changelog-list { flex:1; overflow-y:auto; padding:8px 14px; }
  .change-entry {
    display:flex; gap:8px; padding:5px 0; border-bottom:1px solid var(--border);
    font-size:11px; align-items:flex-start;
  }
  .change-time { color:var(--dim); min-width:38px; }
  .change-icon { min-width:16px; }
  .change-agent { font-weight:bold; min-width:60px; }
  .change-agent.a01 { color:var(--cyan); }
  .change-agent.a02 { color:var(--magenta); }
  .change-agent.a03 { color:var(--green); }
  .change-agent.a04 { color:var(--yellow); }
  .change-agent.a05 { color:var(--blue); }
  .change-agent.a06 { color:#ffaa00; }
  .change-agent.a07 { color:#aa88ff; }
  .change-agent.a08 { color:var(--orange); }
  .change-agent.a09 { color:var(--cyan); }
  .change-agent.a10 { color:var(--text); }
  .change-agent.a11 { color:var(--red); }
  .change-desc { color:var(--dim); flex:1; }
  .change-entry.fix .change-desc  { color:#ff8844; }
  .change-entry.feat .change-desc { color:var(--green); }
  .change-entry.alert .change-desc{ color:var(--red); font-weight:bold; }

  /* Needs panel */
  .needs-panel {
    padding:10px 14px; border-top:1px solid var(--border);
    background:var(--bg3); font-size:11px;
  }
  .needs-title { color:var(--yellow); font-weight:bold; margin-bottom:6px; }
  .needs-item { color:var(--dim); margin-bottom:3px; }
  .needs-item::before { content:"→ "; color:var(--yellow); }

  /* Footer */
  footer {
    padding:6px 14px; border-top:1px solid var(--border);
    font-size:10px; color:var(--dim); text-align:center;
  }

  /* Scanline effect */
  body::after {
    content:''; position:fixed; top:0; left:0; right:0; bottom:0;
    background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px);
    pointer-events:none; z-index:999;
  }
</style>
</head>
<body>

<header>
  <div class="logo">VidFlow <span>AI</span> — Pixel Office</div>
  <div class="status-pill stopped" id="sys-status">
    <div class="pulse"></div>
    <span id="sys-text">Cargando...</span>
  </div>
  <div class="time" id="clock">--:--:--</div>
</header>

<div class="main">
  <div class="left">
    <div class="agents-grid" id="agents-grid"><!-- JS --></div>
    <div class="bottom-panels">
      <div class="panel">
        <div class="panel-title">🎬 Cola de vídeos</div>
        <div id="queue-list"><!-- JS --></div>
      </div>
      <div class="panel">
        <div class="panel-title">📊 Estado del sistema</div>
        <div id="system-stats"><!-- JS --></div>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="right-title">📝 Cambios en tiempo real</div>
    <div class="changelog-list" id="changelog"><!-- JS --></div>
    <div class="needs-panel" id="needs-panel" style="display:none">
      <div class="needs-title">⚠️ Los agentes necesitan:</div>
      <div id="needs-list"></div>
    </div>
    <footer>Actualiza cada 5s · <a href="#" onclick="location.reload()" style="color:var(--cyan)">Recargar</a></footer>
  </div>
</div>

<script>
const AGENTS = [
  {num:"01",name:"Researcher",   sprite:"🔍", face_idle:" (•‿•) ", face_work:" (•ᴗ•) ", color:"cyan"},
  {num:"02",name:"ContentForge", sprite:"✍️",  face_idle:" (o‿o) ", face_work:" (o_o) ", color:"magenta"},
  {num:"03",name:"CodeSentinel", sprite:"💻", face_idle:" (·_·) ", face_work:" (-_-) ", color:"green"},
  {num:"04",name:"SEO Engineer", sprite:"📈", face_idle:" (·‿·) ", face_work:" (·ᴗ·) ", color:"yellow"},
  {num:"05",name:"QualityGate",  sprite:"🛡️", face_idle:" (O‿O) ", face_work:" (O_O) ", color:"blue"},
  {num:"06",name:"MoneyFinder",  sprite:"💰", face_idle:" ($‿$) ", face_work:" ($ᴗ$) ", color:"orange"},
  {num:"07",name:"DataAnalyst",  sprite:"📊", face_idle:" (·_·) ", face_work:" (·‿·) ", color:"orchid"},
  {num:"08",name:"Fixer",        sprite:"🔧", face_idle:" (·‿·) ", face_work:" (·_·) ", color:"orange"},
  {num:"09",name:"TrendHunter",  sprite:"🌊", face_idle:" (∘‿∘) ", face_work:" (∘ᴗ∘) ", color:"cyan"},
  {num:"10",name:"Scheduler",    sprite:"🗓️", face_idle:" (•‿•) ", face_work:" (•_•) ", color:"white"},
  {num:"11",name:"UIEvolution",  sprite:"🎨", face_idle:" (•‿•) ", face_work:" (•_•) ", color:"red"},
  {num:"12",name:"Performance",  sprite:"⚙️", face_idle:" (•‿•) ", face_work:" (•_•) ", color:"cyan"},
  {num:"13",name:"AdsenseWeb",   sprite:"🧩", face_idle:" (•‿•) ", face_work:" (•_•) ", color:"yellow"},
  {num:"14",name:"Affiliate",    sprite:"🔗", face_idle:" (•‿•) ", face_work:" (•_•) ", color:"green"},
  {num:"15",name:"DigitalProd",  sprite:"📦", face_idle:" (•‿•) ", face_work:" (•_•) ", color:"magenta"},
  {num:"16",name:"Sponsorship",  sprite:"🤝", face_idle:" (•‿•) ", face_work:" (•_•) ", color:"blue"},
  {num:"17",name:"Newsletter",   sprite:"✉️", face_idle:" (•‿•) ", face_work:" (•_•) ", color:"orange"},
  {num:"18",name:"Shorts",       sprite:"🎞️", face_idle:" (•‿•) ", face_work:" (•_•) ", color:"cyan"},
  {num:"19",name:"Distribution", sprite:"🚚", face_idle:" (•‿•) ", face_work:" (•_•) ", color:"white"},
  {num:"20",name:"SystemSeller", sprite:"🛒", face_idle:" (•‿•) ", face_work:" (•_•) ", color:"yellow"},
  {num:"21",name:"Community",    sprite:"💬", face_idle:" (•‿•) ", face_work:" (•_•) ", color:"green"},
  {num:"22",name:"ABTesting",    sprite:"🧪", face_idle:" (•‿•) ", face_work:" (•_•) ", color:"blue"},
  {num:"23",name:"Virality",     sprite:"🔥", face_idle:" (•‿•) ", face_work:" (•_•) ", color:"red"},
];

const TASKS = {
  "01":["Analizando competidores...","Buscando afiliados...","Algoritmo YT update..."],
  "02":["Escribiendo hook...","Script Mind Warp...","Guión Mentes Rotas..."],
  "03":["Revisando pipeline.py...","Optimizando ffmpeg...","Añadiendo tests..."],
  "04":["Analizando keywords...","A/B test títulos...","Generando tags..."],
  "05":["Check duración...","Verificando audio...","Anti-ban scan..."],
  "06":["Nuevos afiliados...","Pipeline patrocinios...","Comparando CPAs..."],
  "07":["Leyendo métricas...","Scorecard canales...","RPM por canal..."],
  "08":["Monitorizando logs...","Fix pantalla negra...","OAuth refresh..."],
  "09":["Google Trends scan...","Reddit r/ChatGPT...","Scoring tendencias..."],
  "10":["Coordinando agentes...","Generando briefing...","Revisando queue..."],
  "11":["Mejorando experiencia...","Auditando flujo UI...","Reduciendo fricción..."],
  "12":["Ejecutando benchmarks...","Analizando cuellos...","Optimización activa..."],
  "13":["Monetización web...","Revisando placements...","Ajustando bloques..."],
  "14":["Actualizando afiliados...","Nuevas ofertas...","Tracking conversiones..."],
  "15":["Diseñando producto...","Validando oferta...","Roadmap digital..."],
  "16":["Prospectando sponsors...","Preparando pitch...","Negociación abierta..."],
  "17":["Plan newsletter...","Segmentando audiencia...","Preparando envío..."],
  "18":["Generando shorts...","Recortando highlights...","Batch de clips..."],
  "19":["Distribución canales...","Programando posts...","Sindicando contenido..."],
  "20":["Oferta sistema...","Landing de venta...","Ajustando pricing..."],
  "21":["Moderando comunidad...","Respondiendo feedback...","Activando engagement..."],
  "22":["Corriendo A/B tests...","Analizando variantes...","Seleccionando ganadores..."],
  "23":["Buscando señales virales...","Escalando hooks...","Reforzando retención..."],
};

const CHANGE_ICONS = {fix:"🔧",feat:"✨",content:"✍️",research:"🔍",improve:"📈",delete:"🗑️",alert:"🚨",info:"📝"};
let agentStates = {};
let changelogData = [];
let tick = 0;

function buildAgentCard(agent) {
  const state = agentStates[agent.num] || {status:"idle",task:"",last_run:"nunca"};
  const cls = state.status === "working" ? "working" : state.status === "done" ? "done" : state.status === "error" ? "error" : "";
  const face = state.status === "working" ? agent.face_work : agent.face_idle;
  const taskList = TASKS[agent.num] || ["Trabajando..."];
  const task = state.task || taskList[Math.floor(Date.now()/3000) % taskList.length];
  const dotStyle = state.status === "working" ? "background:var(--cyan)" : "";

  return `<div class="agent-card ${cls}" id="card-${agent.num}">
    <div class="agent-num">${agent.num}</div>
    <div class="bubble">${task}</div>
    <div class="agent-sprite">${agent.sprite}</div>
    <div class="agent-face">${face}\n /||\\\n  /\\</div>
    <div class="agent-name">
      <span class="agent-status-dot" style="${dotStyle}"></span>${agent.name}
    </div>
    <div class="agent-task">${state.status === "working" ? task : "En espera"}</div>
    <div class="agent-last">⏱ ${state.last_run}</div>
  </div>`;
}

function buildQueuePanel(stats) {
  const items = [
    {key:"UPLOADED", label:"✅ Subidos",   cls:"q-uploaded"},
    {key:"APPROVED", label:"🔵 Aprobados", cls:"q-approved"},
    {key:"QUALITY_CHECK",label:"🔍 En check",cls:"q-check"},
    {key:"GENERATING",label:"🟡 Generando",cls:"q-gen"},
    {key:"FIX_REQUIRED",label:"🔴 Con error",cls:"q-fix"},
  ];
  const max = Math.max(1, ...Object.values(stats));
  return items.map(({key,label,cls}) => {
    const n = stats[key] || 0;
    const w = Math.round((n/max)*100);
    return `<div class="queue-item ${cls}">
      <span style="min-width:80px;font-size:10px">${label}</span>
      <div class="queue-bar-wrap"><div class="queue-bar" style="width:${w}%"></div></div>
      <span class="queue-count">${n}</span>
    </div>`;
  }).join("");
}

function buildChangelogHTML() {
  if (!changelogData.length) return '<div class="change-entry"><span class="change-desc">Sin cambios aún...</span></div>';
  return changelogData.slice(-30).reverse().map(e => {
    const num = (e.agent||"").replace("Agent-","").replace("agent-","");
    const icon = CHANGE_ICONS[e.type] || "📝";
    const agentClass = `a${num.padStart(2,"0")}`;
    return `<div class="change-entry ${e.type||"info"}">
      <span class="change-time">${(e.time||"").substring(0,5)}</span>
      <span class="change-icon">${icon}</span>
      <span class="change-agent ${agentClass}">${e.agent||"?"}</span>
      <span class="change-desc">${e.description||""}</span>
    </div>`;
  }).join("");
}

function updateClock() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toTimeString().substring(0,8) + " · " + now.toLocaleDateString("es");
}

async function fetchStatus() {
  try {
    const r = await fetch("/api/status");
    if (!r.ok) throw new Error();
    const data = await r.json();
    agentStates = data.agents || {};
    // Update system status pill
    const pill = document.getElementById("sys-status");
    const txt = document.getElementById("sys-text");
    if (data.master_running) {
      pill.className = "status-pill active";
      txt.textContent = `ACTIVO · PID ${data.master_pid||"?"}`;
    } else {
      pill.className = "status-pill stopped";
      txt.textContent = "SISTEMA PARADO";
    }
  } catch {
    // Use simulated states if no API
    AGENTS.forEach(a => {
      if (!agentStates[a.num]) agentStates[a.num] = {status:"idle",task:"",last_run:"nunca"};
    });
  }
}

async function fetchChangelog() {
  try {
    const r = await fetch("/api/changelog");
    if (r.ok) changelogData = await r.json();
  } catch {
    // Try to read from embedded data if available
  }
}

async function fetchQueue() {
  try {
    const r = await fetch("/api/queue");
    if (r.ok) return await r.json();
  } catch {}
  return {};
}

async function update() {
  tick++;
  updateClock();
  await Promise.all([fetchStatus(), fetchChangelog()]);
  const queue = await fetchQueue();

  // Agents grid
  document.getElementById("agents-grid").innerHTML = AGENTS.map(buildAgentCard).join("");

  // Queue
  document.getElementById("queue-list").innerHTML = buildQueuePanel(queue);

  // System stats
  const working = Object.values(agentStates).filter(s => s.status === "working").length;
  document.getElementById("system-stats").innerHTML = `
    <div style="font-size:11px;line-height:2">
      <div>⚡ Agentes activos: <b style="color:var(--cyan)">${working}/23</b></div>
      <div>📹 Vídeos en cola: <b style="color:var(--text)">${Object.values(queue).reduce((a,b)=>a+b,0)}</b></div>
      <div>📝 Cambios hoy: <b style="color:var(--green)">${changelogData.filter(e=>e.date===new Date().toISOString().slice(0,10)).length}</b></div>
      <div style="color:var(--dim);margin-top:6px;font-size:10px">Actualiza cada 5s</div>
    </div>`;

  // Changelog
  document.getElementById("changelog").innerHTML = buildChangelogHTML();
}

update();
setInterval(update, 5000);
</script>
</body>
</html>
