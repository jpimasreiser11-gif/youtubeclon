<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VidFlow AI — Oficina Virtual</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

:root {
  --floor:   #1a1a2e;
  --wall:    #0f0f1a;
  --desk:    #16213e;
  --accent:  #0f3460;
  --cyan:    #00d4ff;
  --green:   #00ff9d;
  --magenta: #ff006e;
  --yellow:  #ffd60a;
  --orange:  #ff9500;
  --red:     #ff3333;
  --purple:  #9b5de5;
  --text:    #e8e8f0;
  --dim:     #4a4a6a;
  --panel:   rgba(15,15,30,0.95);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:var(--wall);
  font-family:'Space Mono',monospace;
  overflow:hidden;
  height:100vh;
  width:100vw;
  cursor:default;
}

/* ── TOP BAR ─────────────────────────────────────────────── */
#topbar {
  position:fixed; top:0; left:0; right:0; height:44px;
  background:rgba(10,10,20,0.97);
  border-bottom:1px solid var(--dim);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; z-index:100;
  font-family:'Syne',sans-serif;
}
.logo { font-size:16px; font-weight:800; color:var(--cyan); letter-spacing:3px; }
.logo span { color:var(--magenta); }
#sys-pill {
  display:flex; align-items:center; gap:8px;
  padding:4px 14px; border-radius:20px; font-size:11px;
  border:1px solid var(--dim); color:var(--dim);
  transition:all .3s; cursor:pointer;
}
#sys-pill.active { border-color:var(--green); color:var(--green); background:rgba(0,255,157,.05); }
.dot { width:7px; height:7px; border-radius:50%; background:currentColor; }
.dot.pulse { animation:pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
#topbar-time { font-size:11px; color:var(--dim); }
#topbar-chat-btn {
  padding:6px 16px; border-radius:4px; font-size:11px;
  background:var(--cyan); color:#000; border:none; cursor:pointer;
  font-family:'Space Mono',monospace; font-weight:700; letter-spacing:1px;
  transition:opacity .2s;
}
#topbar-chat-btn:hover { opacity:.8; }

/* ── OFFICE CANVAS ───────────────────────────────────────── */
#office {
  position:fixed; top:44px; left:0; right:0; bottom:44px;
  overflow:hidden;
}

/* Floor tiles */
#office::before {
  content:'';
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
  background-size:48px 48px;
  pointer-events:none;
}

/* ── ROOMS ───────────────────────────────────────────────── */
.room {
  position:absolute;
  border:1px solid rgba(255,255,255,.06);
  border-radius:4px;
  display:flex; align-items:flex-start; justify-content:flex-start;
}
.room-label {
  position:absolute; top:8px; left:12px;
  font-size:9px; color:rgba(255,255,255,.15);
  font-family:'Syne',sans-serif; letter-spacing:2px; text-transform:uppercase;
  pointer-events:none;
}

/* Desk furniture */
.desk {
  position:absolute;
  background:var(--desk);
  border:1px solid rgba(255,255,255,.08);
  border-radius:3px;
}
.monitor {
  position:absolute;
  background:#080815;
  border:2px solid #2a2a4a;
  border-radius:2px;
  display:flex; align-items:center; justify-content:center;
  font-size:8px; color:var(--dim);
  overflow:hidden;
}
.monitor.on { border-color:var(--cyan); box-shadow:0 0 8px rgba(0,212,255,.2); }
.monitor-screen { width:100%; height:100%; display:flex; align-items:center; justify-content:center; padding:3px; }
.monitor-text { font-size:7px; color:var(--cyan); text-align:center; word-break:break-all; line-height:1.3; }
.chair { position:absolute; background:#1a1a30; border:1px solid #2a2a45; border-radius:50%; }
.plant {
  position:absolute; font-size:16px;
  filter:saturate(.6); pointer-events:none;
}
.coffee {
  position:absolute; font-size:12px; pointer-events:none;
}

/* ── AGENT SPRITE ────────────────────────────────────────── */
.agent {
  position:absolute;
  width:40px; height:52px;
  cursor:pointer;
  z-index:20;
  transition:filter .2s;
  user-select:none;
}
.agent:hover { filter:brightness(1.3); }
.agent.selected { filter:brightness(1.5) drop-shadow(0 0 6px var(--cyan)); }

.agent-body {
  position:relative; width:100%; height:100%;
  display:flex; flex-direction:column; align-items:center;
}
.agent-head {
  width:22px; height:22px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; position:relative; flex-shrink:0;
  transition:all .3s;
}
.agent-torso {
  width:20px; height:16px;
  border-radius:3px 3px 0 0;
  margin-top:1px; flex-shrink:0;
}
.agent-legs {
  width:20px; height:10px;
  display:flex; gap:2px;
}
.leg { flex:1; border-radius:0 0 3px 3px; }

.agent-name-tag {
  position:absolute;
  bottom:-18px;
  left:50%; transform:translateX(-50%);
  font-size:7.5px; white-space:nowrap;
  padding:2px 6px; border-radius:10px;
  font-family:'Syne',sans-serif; font-weight:600; letter-spacing:.5px;
  pointer-events:none;
}

/* Status indicator above head */
.agent-status-icon {
  position:absolute; top:-12px; left:50%; transform:translateX(-50%);
  font-size:11px; pointer-events:none;
  animation:float 2s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-3px)} }

/* Working animation */
.agent.working .agent-head { animation:nod .6s ease-in-out infinite alternate; }
@keyframes nod { from{transform:rotate(-4deg)} to{transform:rotate(4deg)} }

/* Walking animation */
.agent.walking .agent-legs .leg:first-child { animation:walk-l .4s ease-in-out infinite alternate; }
.agent.walking .agent-legs .leg:last-child  { animation:walk-r .4s ease-in-out infinite alternate; }
@keyframes walk-l { from{transform:rotate(-15deg)} to{transform:rotate(15deg)} }
@keyframes walk-r { from{transform:rotate(15deg)} to{transform:rotate(-15deg)} }

/* Speech bubble */
.bubble {
  position:absolute;
  top:-38px; left:50%;
  transform:translateX(-30%);
  background:rgba(15,15,30,.95);
  border:1px solid var(--cyan);
  border-radius:8px 8px 8px 0;
  padding:4px 8px;
  font-size:8px; color:var(--cyan);
  white-space:nowrap; max-width:120px; overflow:hidden; text-overflow:ellipsis;
  pointer-events:none;
  opacity:0; transition:opacity .3s;
}
.agent.working .bubble,
.agent.walking .bubble { opacity:1; }

/* ── SIDE PANEL ──────────────────────────────────────────── */
#side-panel {
  position:fixed; right:0; top:44px; bottom:44px;
  width:340px;
  background:var(--panel);
  border-left:1px solid rgba(255,255,255,.07);
  z-index:50;
  display:flex; flex-direction:column;
  transform:translateX(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
#side-panel.open { transform:translateX(0); }

#panel-header {
  padding:16px 18px 12px;
  border-bottom:1px solid rgba(255,255,255,.07);
  display:flex; align-items:center; gap:10px;
}
#panel-agent-icon { font-size:26px; }
#panel-agent-name { font-family:'Syne',sans-serif; font-size:15px; font-weight:800; }
#panel-agent-role { font-size:10px; color:var(--dim); margin-top:1px; }
#panel-close {
  margin-left:auto; width:26px; height:26px;
  border:1px solid var(--dim); border-radius:50%;
  background:none; color:var(--dim); cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s;
}
#panel-close:hover { border-color:var(--text); color:var(--text); }

#panel-tabs {
  display:flex; border-bottom:1px solid rgba(255,255,255,.07);
}
.ptab {
  flex:1; padding:10px; text-align:center; font-size:9px;
  letter-spacing:1px; cursor:pointer; color:var(--dim);
  border-bottom:2px solid transparent; transition:all .2s;
  font-family:'Syne',sans-serif; font-weight:600;
}
.ptab.active { color:var(--cyan); border-bottom-color:var(--cyan); }

#panel-body { flex:1; overflow-y:auto; padding:14px 18px; }
#panel-body::-webkit-scrollbar { width:4px; }
#panel-body::-webkit-scrollbar-thumb { background:var(--dim); border-radius:2px; }

.section-title {
  font-size:9px; color:var(--dim); letter-spacing:2px;
  text-transform:uppercase; margin-bottom:10px; margin-top:16px;
  font-family:'Syne',sans-serif;
}
.section-title:first-child { margin-top:0; }

/* Diary text */
#diary-text {
  font-size:12px; color:var(--text); line-height:1.7;
  white-space:pre-wrap; font-family:'Space Mono',monospace;
}

/* File list */
.file-item {
  display:flex; align-items:center; gap:8px;
  padding:6px 0; border-bottom:1px solid rgba(255,255,255,.04);
  font-size:10px;
}
.file-icon { font-size:12px; }
.file-path { color:var(--cyan); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.file-action { font-size:9px; padding:2px 7px; border-radius:10px; font-family:'Syne',sans-serif; }
.file-action.fix     { background:rgba(255,100,50,.15); color:var(--orange); }
.file-action.create  { background:rgba(0,255,157,.1); color:var(--green); }
.file-action.edit    { background:rgba(0,212,255,.1); color:var(--cyan); }
.file-action.research{ background:rgba(155,93,229,.15); color:var(--purple); }

/* Task log */
.task-entry {
  display:flex; gap:8px; padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,.04);
  align-items:flex-start;
}
.task-time { font-size:9px; color:var(--dim); min-width:42px; }
.task-text { font-size:10px; color:var(--text); line-height:1.5; }
.task-text b { color:var(--cyan); }

/* Chat panel */
#chat-input-wrap {
  padding:10px 14px;
  border-top:1px solid rgba(255,255,255,.07);
  display:flex; gap:8px; align-items:flex-end;
}
#chat-input {
  flex:1; background:rgba(255,255,255,.05); border:1px solid var(--dim);
  border-radius:4px; color:var(--text); padding:8px 10px;
  font-family:'Space Mono',monospace; font-size:11px; resize:none;
  outline:none; max-height:80px;
}
#chat-input:focus { border-color:var(--cyan); }
#chat-send {
  padding:8px 14px; background:var(--cyan); color:#000;
  border:none; border-radius:4px; cursor:pointer;
  font-family:'Space Mono',monospace; font-size:11px; font-weight:700;
}
.chat-msg {
  padding:6px 0; font-size:10px; border-bottom:1px solid rgba(255,255,255,.04);
}
.chat-from { color:var(--cyan); font-size:9px; margin-bottom:3px; }
.chat-body { color:var(--text); line-height:1.6; }

/* ── NEEDS PANEL ─────────────────────────────────────────── */
#needs-overlay {
  position:fixed; top:44px; left:0; right:0; bottom:44px;
  background:rgba(0,0,0,.7); z-index:80;
  display:none; align-items:center; justify-content:center;
}
#needs-overlay.show { display:flex; }
#needs-modal {
  background:var(--panel); border:1px solid var(--yellow);
  border-radius:8px; padding:24px; max-width:480px; width:90%;
  max-height:70vh; overflow-y:auto;
}
#needs-title { font-family:'Syne',sans-serif; font-size:16px; font-weight:800; color:var(--yellow); margin-bottom:16px; }
.need-item {
  background:rgba(255,214,10,.05); border:1px solid rgba(255,214,10,.2);
  border-radius:6px; padding:12px 14px; margin-bottom:10px;
}
.need-from { font-size:9px; color:var(--yellow); margin-bottom:5px; }
.need-text { font-size:11px; color:var(--text); line-height:1.6; }
.need-input {
  margin-top:8px; width:100%;
  background:rgba(255,255,255,.05); border:1px solid var(--dim);
  border-radius:4px; color:var(--text); padding:6px 10px;
  font-family:'Space Mono',monospace; font-size:10px; outline:none;
}
.need-input:focus { border-color:var(--yellow); }
.need-send {
  margin-top:6px; padding:5px 12px; background:var(--yellow); color:#000;
  border:none; border-radius:4px; cursor:pointer; font-size:10px;
  font-family:'Space Mono',monospace; font-weight:700;
}
#needs-close {
  margin-top:16px; padding:8px 20px;
  background:none; border:1px solid var(--dim); border-radius:4px;
  color:var(--dim); cursor:pointer; font-size:11px; font-family:'Space Mono',monospace;
}

/* ── CHANGELOG TICKER ────────────────────────────────────── */
#ticker {
  position:fixed; bottom:0; left:0; right:0; height:44px;
  background:rgba(10,10,20,.97); border-top:1px solid var(--dim);
  display:flex; align-items:center; gap:16px; padding:0 16px;
  z-index:100; overflow:hidden;
}
#ticker-label {
  font-size:9px; color:var(--cyan); font-family:'Syne',sans-serif;
  font-weight:600; letter-spacing:2px; white-space:nowrap; flex-shrink:0;
}
#ticker-track {
  flex:1; overflow:hidden; position:relative; height:100%;
  display:flex; align-items:center;
}
#ticker-items {
  display:flex; gap:48px; white-space:nowrap;
  animation:scroll-left 40s linear infinite;
}
@keyframes scroll-left { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.ticker-item { font-size:10px; color:var(--dim); display:flex; align-items:center; gap:8px; }
.ticker-item span { color:var(--text); }
.ticker-item b { color:var(--cyan); }

#needs-btn {
  padding:6px 14px; border-radius:4px; font-size:10px;
  background:rgba(255,214,10,.1); border:1px solid var(--yellow);
  color:var(--yellow); cursor:pointer; font-family:'Space Mono',monospace;
  white-space:nowrap; flex-shrink:0; transition:background .2s;
}
#needs-btn:hover { background:rgba(255,214,10,.2); }
#needs-btn.has-needs { animation:needs-pulse 2s ease-in-out infinite; }
@keyframes needs-pulse { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 12px rgba(255,214,10,.4)} }
</style>
</head>

<!-- NEEDS OVERLAY -->

// ── ANIMATION LOOP ───────────────────────────────────────
function animate() {
  animFrame++;
  const t = animFrame;

  AGENTS.forEach(agent => {
    const s = agentStates[agent.id];
    const el = document.getElementById(`agent-${agent.id}`);
    const si = document.getElementById(`si-${agent.id}`);
    const bubble = document.getElementById(`bubble-${agent.id}`);
    if (!el) return;

    // Decide state randomly
    s.walkTimer--;
    s.taskTimer--;

    if (s.walkTimer <= 0) {
      s.walkTimer = 150 + Math.floor(Math.random() * 200);
      // Pick a random target near the desk
      const desk = agent.deskPos;
      const goToDesk = Math.random() > 0.4;
      if (goToDesk) {
        s.targetX = desk.x + 5 + Math.random() * 30;
        s.targetY = desk.y + 50;
        s.state = 'walking';
      } else {
        // Wander a bit
        s.targetX = agent.baseX + (Math.random() - .5) * 60;
        s.targetY = agent.baseY + (Math.random() - .5) * 40;
        s.state = Math.random() > .5 ? 'walking' : 'working';
      }
    }

    if (s.taskTimer <= 0) {
      s.taskTimer = 100 + Math.floor(Math.random() * 150);
      const tasks = TASK_ROTATION[agent.id] || ['Trabajando...'];
      s.taskIdx = (s.taskIdx + 1) % tasks.length;
      s.task = tasks[s.taskIdx];
      if (bubble) bubble.textContent = s.task;
      addTickerEntry(agent, s.task);
    }

    // Move toward target
    const dx = s.targetX - s.x;
    const dy = s.targetY - s.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 2) {
      s.x += (dx / dist) * 1.2;
      s.y += (dy / dist) * 1.2;
      s.state = 'walking';
    } else {
      if (s.state === 'walking') s.state = 'working';
    }

    // If close enough to desk, working
    const deskDist = Math.sqrt((s.x - agent.deskPos.x)**2 + (s.y - agent.deskPos.y)**2);
    if (deskDist < 60) s.state = 'working';

    // Apply position and classes
    el.style.left = `${Math.round(s.x)}px`;
    el.style.top  = `${Math.round(s.y)}px`;
    el.className  = `agent ${s.state} ${selectedAgent === agent.id ? 'selected' : ''}`;

    // Status icon
    const icons = { idle:'💤', working:'⚡', walking:'👟' };
    if (si) si.textContent = icons[s.state] || '💤';
  });

  requestAnimationFrame(animate);
}

      <span class="file-action ${f.action}">${f.action}</span>
    </div>`
  ).join('') || '<div style="color:var(--dim);font-size:11px">Sin ficheros modificados.</div>';
}

function populateLogTab(id) {
  const agent = AGENTS.find(a => a.id === id);
  const tasks = TASK_ROTATION[id] || [];
  document.getElementById('log-list').innerHTML = tasks.map((t, i) => {
    const h = (8 + Math.floor(i * 1.5)) % 24;
    const m = (i * 23) % 60;
    return `<div class="task-entry">
      <div class="task-time">${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}</div>
      <div class="task-text">${t}</div>
    </div>`;
  }).join('');
}

function closePanel() {
  selectedAgent = null;
  document.getElementById('side-panel').classList.remove('open');
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.ptab').forEach((t,i) => {
    const tabs = ['diary','files','log','chat'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  ['diary','files','log','chat'].forEach(t => {
    const el = document.getElementById(`tab-${t}`);
    if (el) el.style.display = t === tab ? 'block' : 'none';
  });
  const chatWrap = document.getElementById('chat-input-wrap');
  if (chatWrap) chatWrap.style.display = tab === 'chat' ? 'flex' : 'none';
}

// ── CHAT ─────────────────────────────────────────────────
function openChat() {
  if (!selectedAgent) {
    const a = AGENTS[Math.floor(Math.random()*AGENTS.length)];
    selectAgent(a.id);
  }
  switchTab('chat');
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg || !selectedAgent) return;
  input.value = '';

  const agent = AGENTS.find(a => a.id === selectedAgent);
  const msgs = document.getElementById('chat-messages');
  msgs.innerHTML += `<div class="chat-msg"><div class="chat-from">Tú</div><div class="chat-body">${msg}</div></div>`;

  // Simulate response after delay
  setTimeout(() => {
    const replies = {
      "00":"Entendido. Voy a revisar el estado del equipo y te informo en el briefing de esta tarde.",
      "01":"De acuerdo. Lo añado a la lista de investigación. Dame unos minutos para buscarlo.",
      "02":"Perfecto, voy a ajustar el script con eso en mente. El nuevo ángulo tiene mucho potencial.",
      "03":"Ok. Voy a revisar ese módulo ahora mismo y reporto si encuentro algo.",
      "12":"Anotado. Lo incluyo en la lista de ayuda humana que te presentaré esta tarde junto con el resto de peticiones del equipo.",
    };
    const reply = replies[selectedAgent] || "Recibido. Lo tengo en cuenta para mi próxima tarea.";
    msgs.innerHTML += `<div class="chat-msg"><div class="chat-from" style="color:${agent.color}">${agent.emoji} Agent-${agent.id} · ${agent.name}</div><div class="chat-body">${reply}</div></div>`;
    msgs.scrollTop = msgs.scrollHeight;
  }, 1200);
}

// ── TICKER ───────────────────────────────────────────────
function addTickerEntry(agent, task) {
  const entry = { agent, task, time: new Date().toLocaleTimeString('es', {hour:'2-digit',minute:'2-digit'}) };
  tickerEntries.unshift(entry);
  if (tickerEntries.length > 30) tickerEntries.pop();
  updateTicker();
}

function updateTicker() {
  const items = tickerEntries.slice(0, 15);
  // Duplicate for seamless loop
  const html = [...items, ...items].map(e =>
    `<div class="ticker-item">${e.time} <b style="color:${e.agent.color}">${e.agent.emoji} ${e.agent.name}</b> <span>${e.task}</span></div>`
  ).join('');
  document.getElementById('ticker-items').innerHTML = html;
}

// ── NEEDS ────────────────────────────────────────────────
const NEEDS_FALLBACK = [
  { agent:"Agent-08 (Fixer)", text:"El token OAuth del canal Mentes Rotas ha expirado. Necesito que vayas a YouTube Studio, accedas a la configuración de la cuenta y autorices de nuevo la aplicación. Te tomará 3 minutos. URL: studio.youtube.com → Configuración → Permisos." },
  { agent:"Agent-12 (NetForager)", text:"Para integrar Kokoro TTS (la voz open source que encontré) necesito que instales: pip install kokoro-tts. También necesitas al menos 2GB libres en disco. ¿Puedes confirmarlo?" },
  { agent:"Agent-01 (Researcher)", text:"El programa de afiliados de Masterworks requiere registro manual. Ve a masterworks.com/affiliate, regístrate con el email del proyecto y copia el enlace de referido en AFFILIATE_LINKS.md." },
];

function getNeedAgentId(text) {
  const m = String(text || '').match(/agent[-\s]?(\d{2})/i);
  return m ? m[1] : "24";
}

function getNeedAgentLabel(text) {
  const id = getNeedAgentId(text);
  const agent = AGENTS.find(a => a.id === id);
  return agent ? `Agent-${id} (${agent.name})` : `Agent-${id}`;
}

async function openNeeds() {
  const list = document.getElementById('needs-list');
  list.innerHTML = '<div style="color:var(--dim);font-size:11px">Cargando needs...</div>';
  try {
    const res = await fetch('/api/needs');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    needsList = (Array.isArray(data) ? data : []).map((text, i) => ({
      index: i,
      text: String(text || ''),
      agent: getNeedAgentLabel(text),
      agentId: getNeedAgentId(text),
    }));
  } catch (e) {
    needsList = NEEDS_FALLBACK.map((n, i) => ({ index: i, text: n.text, agent: n.agent, agentId: getNeedAgentId(n.agent) }));
  }

  if (!needsList.length) {
    list.innerHTML = '<div style="color:var(--dim);font-size:11px">No hay ayudas pendientes.</div>';
    document.getElementById('needs-overlay').classList.add('show');
    return;
  }

  list.innerHTML = needsList.map((n, i) =>
    `<div class="need-item">
      <div class="need-from">De: ${n.agent}</div>
      <div class="need-text">${n.text}</div>
      <input class="need-input" id="need-input-${i}" placeholder="Tu respuesta o confirmación...">
      <button class="need-send" onclick="replyNeed(${i})">Responder →</button>
    </div>`
  ).join('');
  document.getElementById('needs-overlay').classList.add('show');
}

async function replyNeed(i) {
  const input = document.getElementById(`need-input-${i}`);
  const val = input.value.trim();
  if (!val) return;
  const btn = document.querySelector(`#need-input-${i} ~ button`);
  btn.disabled = true;
  btn.textContent = 'Enviando...';
  try {
    const need = needsList[i];
    const res = await fetch('/api/needs/reply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ index: need.index, reply: val }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const agent = AGENTS.find(a => a.id === need.agentId);
    if (agent) addTickerEntry(agent, 'Recibió respuesta humana y fue notificado');
    input.value = '';
    input.placeholder = '✅ Respuesta enviada al agente';
    input.disabled = true;
    btn.style.display = 'none';
    setTimeout(() => openNeeds(), 500);
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Responder →';
    input.placeholder = 'Error al enviar. Intenta de nuevo.';
  }
}

function closeNeeds() {
  document.getElementById('needs-overlay').classList.remove('show');
}

// ── CLOCK & SYSTEM ────────────────────────────────────────
let systemRunning = true;
function toggleSystem() {
  systemRunning = !systemRunning;
  document.getElementById('sys-label').textContent = systemRunning ? 'Sistema activo' : 'Sistema parado';
  document.getElementById('sys-pill').className = systemRunning ? 'active' : '';
  document.getElementById('sys-dot').className = systemRunning ? 'dot pulse' : 'dot';
}

function updateClock() {
  const now = new Date();
  document.getElementById('topbar-time').textContent =
    now.toLocaleTimeString('es', {hour:'2-digit',minute:'2-digit',second:'2-digit'}) +
    ' · ' + now.toLocaleDateString('es', {day:'2-digit',month:'short'});
}

// ── INIT ──────────────────────────────────────────────────
buildOffice();
requestAnimationFrame(animate);
setInterval(updateClock, 1000);
updateClock();

document.getElementById('sys-label').textContent = 'Sistema activo';
document.getElementById('sys-pill').className = 'active';
document.getElementById('sys-dot').className = 'dot pulse';

// Initial ticker entries
AGENTS.forEach(a => addTickerEntry(a, TASK_ROTATION[a.id][0]));

// Chat enter key
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

// Keyboard close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closePanel(); closeNeeds(); }
});
</script>
